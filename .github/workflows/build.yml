name: Build Geode Mod
on: [push, workflow_dispatch]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest

    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: nightly
          combine: true
        env:
          # This ensures the "Magic Line" in CMakeLists knows where to look
          GEODE_SDK: ${{ github.workspace }}/geode-sdk
